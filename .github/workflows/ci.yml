name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# Reusable не расширяет права сам — явный permissions обнуляет неперечисленное (объём — по канону
# каждого reusable: go → contents:read; frontend → +packages; node → +actions,+packages).
permissions: { contents: read, packages: read }
jobs:
  go:
    uses: omnifield/devopser/.github/workflows/go-ci.yml@main
  # Фронт приземлился (web/, vite+solid) -> включаем web-ci (lint/typecheck/test/build).
  web:
    uses: omnifield/devopser/.github/workflows/web-ci.yml@main
    with:
      working-directory: web
