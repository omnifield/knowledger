name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# Reusable не расширяет права сам — явный permissions обнуляет неперечисленное (объём — по канону
# каждого reusable: go → contents:read; frontend → +packages; node → +actions,+packages).
permissions: { contents: read, actions: read, packages: read }
jobs:
  node:
    uses: omnifield/devopser/.github/workflows/node-ci.yml@main
